<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오목의 숲</title>
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="container main">
      <header><span></span></header>
      <div class="content">
        <div class="sideBoxL">
          <div class="profileBox">
            <div class="img"></div>
            <div class="textBox">
              <p>닉네임 : 테스트</p>
              <p>
                <span class="blue">100</span> 승 <span class="red">1</span> 패
              </p>
              <p>현재 순위 : <span class="yellow">1</span> 등</p>
            </div>
            <div class="createRommBtn"></div>
          </div>
          <div class="RankBox">
            <!-- 여기부터 지원 작성 -->
            <div class="rankTitle"></div>
              <ul class="rankList">
                <li class="rankItem">
                  <span class="rankProfileName">
                    1등
                  </span>
                  <span>
                    <img class="rankProfile" src="../img/img-rank1.png"/>
                  </span>
                  <span class="rankProfileName">
                    닉네임
                  </span>
                </li>
               
                 <li class="rankItem">
                  <span class="rankProfileName">
                    2등
                  </span>
                  <span>
                    <img class="rankProfile" src="../img/img-rank1.png"/>
                  </span>
                  <span class="rankProfileName">
                    닉네임
                  </span>
                </li>

                 <li class="rankItem">
                  <span class="rankProfileName">
                    3등
                  </span>
                  <span class="rankProfile">
                    <img  src="../img/img-rank1.png"/>
                  </span>
                  <span class="rankProfileName">
                    닉네임
                  </span>
                </li>
              </ul>
          </div>
          <!-- 여기까지 지원 작성 -->
        </div>
        <div class="sideBoxR">
          <ul class="roomList">
            <li class="roomItem">방 아이템</li>
          </ul>
          <div class="pagination"></div>
        </div>
      </div>
      <footer></footer>
    </div>
  </body>
</html>
