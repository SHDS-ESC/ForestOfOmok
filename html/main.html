<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오목의 숲 🍀</title>
  <link rel="stylesheet" href="../css/reset.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="icon" href="../img/sec05_chara02.png" />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
</head>

<body>
  <!-- 브금 제어 버튼 -->
  <div id="playico"></div>
  <div onclick="window.playBGM()" id="play"></div>
  <div onclick="window.stopBGM()" id="stop"></div>
  <!-- 브금 제어 버튼 -->
  <!-- 임시 버튼 -->
  <img src="../img/sec09_chara03.png" alt="" id="moveLoginBtn" />
  <img src="../img/slowlife_chara01__pc.png" alt="" id="moveGameBtn" />
  <!-- 임시 버튼 -->
  <div class="container main">
    <header><span></span></header>
    <div class="content">
      <div class="sideBoxL">
        <div class="profileBox">
          <div class="img"></div>
          <div class="textBox">
            <p>닉네임 : 테스트</p>
            <p>
              <span class="blue">100</span> 승 <span class="red">1</span> 패
            </p>
            <p>현재 순위 : <span class="yellow">1</span> 등</p>
          </div>
          <div class="createRommBtn"></div>
        </div>
        <div class="RankBox">
          <!-- 여기부터 지원 작성 -->
          <div class="rankTitle"></div>
          <ul class="rankList">
            <li class="rankItem">
              <span class="rankProfileName">
                1등
              </span>
              <span>
                <img class="rankProfile" src="../img/img-rank1.png" />
              </span>
              <span class="rankProfileName">
                닉네임
              </span>
              <span class="rankScore">
                점수
              </span>
            </li>
            <li class="rankItem">
              <span class="rankProfileName">
                2등
              </span>
              <span>
                <img class="rankProfile" src="../img/img-rank1.png" />
              </span>
              <span class="rankProfileName">
                닉네임
              </span>
              <span class="rankScore">
                점수
              </span>
            </li>

            <li class="rankItem">
              <span class="rankProfileName">
                3등
              </span>
              <span>
                <img class="rankProfile" src="../img/img-rank1.png" />
              </span>
              <span class="rankProfileName">
                닉네임
              </span>
              <span class="rankScore">
                점수
              </span>
            </li>
            <li class="rankItem">
              <span class="rankProfileName">
                4등
              </span>
              <span>
                <img class="rankProfile" src="../img/img-rank1.png" />
              </span>
              <span class="rankProfileName">
                닉네임
              </span>
              <span class="rankScore">
                점수
              </span>
            </li>
          </ul>
        </div>
        <!-- 여기까지 지원 작성 -->
      </div>
      <div class="sideBoxR">
        <!-- 방 없을 때  -->
        <div class="emptyRoom">
          <span></span>
          <p>아직 방이 없어요</p>
          <p>방을 만들어서 시작해주세요!</p>
        </div>

        <!-- 방 있을 때 -->
        <ul class="roomList" style="display: none">
          <li class="roomItem">
            <!-- 히스 토리 아이템 -->
            <div class="historyItem">
              <div class="historyItemL">
                <span class="historyStoneInfoMe">흑</span>
                <span><img class="historyProfileMe" src="../img/img-rank1.png" /></span>
                <span class="historyNickNameMe">곰돌이</span>
              </div>

              <div class="historyItemR">
                <span class="historyNickNameYou">곰돌이</span>
                <span><img class="historyProfileYou" src="../img/img-rank1.png" /></span>
                <span class="historyStoneInfoYou">백</span>
              </div>
            </div>
          </li>
        </ul>
      </div>
    </div>
    <footer></footer>
  </div>
  <!-- 모달창 -->
  <div id="modalComponent"></div>
  <script>
    $(function () {
      let test = false; // 임시

      // modal.html 불러오기
      $("#modalComponent").load("modal.html");

      // 방 만들기
      $(".createRommBtn").click(function () {
        alert("방만들기");
        test = true; // 테스트로 방만들기 true
        $(".emptyRoom").hide(); // 방 없을때 메시지 숨김
        $(".roomList").show(); // 방 있을때 컴포넌트 display: none -> show 노출

        // ul > li 태그 append로 붙이기
        $(".roomList").append(`<li class="roomItem">${"✨ 새 방 생성"}</li>`);
      });

      // 방 들어가기
      // 동적으로 추가된 방
      // .click() 바인딩은 나중에 추가된 요소는 반응하지 않는다고함
      // -> 이벤트 위임 방식 이용
      $(".roomList").on("click", ".roomItem", function () {
        const index = $(".roomList .roomItem").index(this);
        console.log(index);
        alert(`방 ${index + 1}번`);
      });

      // 로그인 페이지로 이동 (임시)
      $("#moveLoginBtn").click(function () {
        location.href = "login.html"; // 같은 폴더라면 슬래시 (/) 없이
      });

      // 게임 페이지로 이동 (임시)
      $("#moveGameBtn").click(function () {
        location.href = "game.html"; // 같은 폴더라면 슬래시 (/) 없이
      });
    });


    // 버튼 클릭 시 열리고, 닫힘 토글
    let isOpen = false;
    $(".historyItemL").click(function () {
      const selectRroom = $(this).closest(".roomItem");
      if (isOpen) {
        selectRroom.css("height", "");
      } else {
        selectRroom.css("height", "500px");
        selectRroom.css("background-color", "black")
      }
      isOpen = !isOpen;
    });

    $(".historyItemR").click(function () {
      const selectRroom = $(this).closest(".roomItem");
      if (isOpen) {
        selectRroom.css("height", "");
      } else {
        selectRroom.css("height", "500px");
        selectRroom.css("background-color", "white")
      }
      isOpen = !isOpen;
    });


    let slideOpen = function (direction, paddingSelf, paddingTarget) {
      if (!isOpen) {
        $(this).css({
          width: "100%",
          "z-index": "2",
          padding: paddingSelf // 점령한 쪽은 여백 없애기
        });
        $(this).siblings(direction).css({
          width: "0%",
          padding: paddingTarget // 밀린 쪽도 여백 없애기
        });
      }
    };

    let slideClose = function (direction, paddingSelf, paddingTarget) {
      if (!isOpen) {
        $(this).css({
          width: "50%",
          "z-index": "1",
          padding: paddingSelf // 원상복귀
        });
        $(this).siblings(direction).css({
          width: "50%",
          padding: paddingTarget // 원상복귀
        });
      }
    };

    // 왼쪽 hover 시
    $(".historyItemL").hover(
      function () {
        slideOpen.call(this, ".historyItemR", "10px 0", "10px 0"); // L 점령
      },
      function () {
        slideClose.call(this, ".historyItemR", "10px 5px 10px 0", "10px 0 10px 5px");
      }
    );

    // 오른쪽 hover 시
    $(".historyItemR").hover(
      function () {
        slideOpen.call(this, ".historyItemL", "10px 0", "10px 0"); // R 점령
      },
      function () {
        slideClose.call(this, ".historyItemL", "10px 0 10px 5px", "10px 5px 10px 0");
      }
    );

  </script>

</body>

</html>
