<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>오목 게임</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>  
  <div id="background"></div> 
  
  <button id="resignBtn" style="position:absolute; top:10px; left:10px; z-index:10; background:transparent; border:none; padding:0;">
    <img src="img/flag.png" alt="항복" style="width:32px; height:32px;">
  </button> 

  <!-- 누구 차례인지 표시 -->
  <div id="info">1st player's turn</div>

  <!-- 승리 메시지 표시 -->
  <div id="msg"></div>

  <div class="timer-wrap">
    <img src="img/bomb.png" class="timer-profile" alt="타이머 프로필">
    <div class="timer-box">
      <span id="timer">0:30</span>
    </div>
  </div>
  
  <div id="resignQuestion" style="display:none; position:fixed; left:0; top:0; width:100vw; height:100vh; background:rgba(0,0,0,0.3); z-index:1000;">
    <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; padding:30px 40px; border-radius:10px; text-align:center; box-shadow:0 2px 16px rgba(0,0,0,0.2);">
      <div style="margin-bottom:20px; font-size:1.2em;">정말 항복하시겠습니까?</div>
      <button id="resignYes" style="margin-right:20px;">예</button>
      <button id="resignNo">아니오</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
