<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오목의 숲 🍀</title>
    <link rel="stylesheet" href="/forestOfOmok/css/reset.css" />
    <link rel="stylesheet" href="/forestOfOmok/css/login.css" />
    <link rel="icon" href="/forestOfOmok/img/sec05_chara02.png" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  </head>
  <body id="login">
    <div class="container login">
      <header></header>
      <div class="content">
        <div class="loginBox">
          <h2>로그인</h2>
          <form method = "post" action = "/forestOfOmok/login">
            <div class="userBox">
              <input type="text" name="name" required="" />
              <label>닉네임</label>
            </div>
            <div class="userBox">
              <input type="password" name="pwd" required="" />
              <label>비밀번호</label>
            </div>
            <div class="assign" onclick="location.href='/forestOfOmok/html/join.html'">
              회원가입
            </div>
            <div class="find" onclick="location.href = '/forestOfOmok/html/findId.html'">
              아이디/비밀번호 찾기
            </div>
            <button
              class="loginBtn" type = "submit"
            ></button>
          	<div id="errorMsg"></div>
          	
          </form>
        </div>
      </div>
      <footer></footer>
    </div>
    <script>
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get("error") === "1") {
      const msgBox = document.getElementById("errorMsg");
      msgBox.textContent = "아이디 또는 비밀번호가 잘못되었습니다.";
      msgBox.style.color = "red";
    }

    </script>
  </body>
</html>
