<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오목의 숲 🍀</title>
    <link rel="stylesheet" href="/forestOfOmok/css/signUp.css" />
    <link rel="stylesheet" href="/forestOfOmok/css/reset.css" />
    <link rel="stylesheet" href="/forestOfOmok/css/style.css" />
    <link rel="icon" href="/forestOfOmok/img/sec05_chara02.png" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <style>
      .signUpBox {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 400px;
        padding: 40px;
        transform: translate(-50%, -50%);
        background: #fff4f4e6;
        box-sizing: border-box;
        box-shadow: 0 15px 25px rgba(0, 0, 0, 0.6);
        border-radius: 10px;
        border: 2px solid #2ba7ff;
      }

      .signUpBox h2 {
        margin: 0 0 30px;
        padding: 0;
        color: #0095ff;
        text-align: center;
        font-size: 24px;
      }

      .signUpBox .userBox {
        position: relative;
      }

      .signUpBox .userBox input {
        width: 100%;
        padding: 10px 0;
        font-size: 16px;
        color: #0095ff;
        margin-bottom: 30px;
        border: none;
        border-bottom: 2px solid #a1a1a1;
        outline: none;
        background: transparent;
      }

      .signUpBox .userBox label {
        position: absolute;
        top: 0;
        left: 0;
        padding: 10px 0;
        font-size: 16px;
        color: #0095ff;
        pointer-events: none;
        transition: 0.5s;
      }

      .signUpBox .userBox input:focus ~ label,
      .signUpBox .userBox input:valid ~ label {
        top: -20px;
        left: 0;
        color: #0095ff;
        font-size: 12px;
      }

      .signUpBox form a {
        position: relative;
        display: inline-block;
        padding: 10px 20px;
        color: #0095ff;
        font-size: 16px;
        text-decoration: none;
        text-transform: uppercase;
        overflow: hidden;
        transition: 0.5s;
        margin-top: 40px;
        letter-spacing: 4px;
      }

      button.joinBtn {
      	all : unset;
        width: 180px;
        background-image: url("/forestOfOmok/img/Group 37.png");
        background-position: center;
        background-repeat: no-repeat;
        background-size: contain;
        height: 80px;
        margin: auto;
        cursor: pointer;
        display : block;
      }

      button.joinBtn:hover {
        background-image: url("/forestOfOmok/img/Group 36.png");
      }

      .btn {
        background: #fff4f4e6;
        box-sizing: border-box;
        box-shadow: 0 5px 5px rgba(0, 0, 0, 0.358);
        border-radius: 10px;
        border: 2px solid #2ba7ff;
        cursor: pointer;
        padding: 2px 8px;
      }

      .btn:hover {
        background: #2ba7ff;
        transition: 0.2s;
        color: #fff;
      }

      .idCheckBtn {
        position: absolute;
        top: 0;
        right: 0;
      }

      #toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        background: linear-gradient(135deg, #5a5a5a, #5a5a5a);
        color: white;
        padding: 12px 24px;
        font-size: 16px;
        border-radius: 30px;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.2);
        opacity: 0;
        transition: all 0.5s ease;
        z-index: 9999;
        pointer-events: none;
      }

      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(-120px);
      }

      .userBox .red {
        color: rgb(255, 64, 64);
        display: block;
        position: absolute;
        font-size: 11px;
        bottom: 15px;
        opacity: 0;
        transition: 0.2s;
      }
    </style>
  </head>
  <body id="login">
    <div class="container login">
      <header></header>
      <div class="content">
        <div class="signUpBox">
          <h2>회원가입</h2>
          <div class="profileImg">
            <div class="circle" id="profileCircle"></div>
            <button type="button" onclick="openModal()">이미지 선택</button>
          </div>
          <form action = "/forestOfOmok/join" method = "post" > 
            <input type = "hidden" name = "imgId" id = "imgId" value = "1"/>
            <div class="userBox">
              <input type="text" name="name" id = "name" required="" />
              <label>아이디</label>
              <button class="btn idCheckBtn" type="button">중복확인</button>
            </div>
            <div class="userBox">
              <input class="password" type="password" name="pwd" required="" />
              <label>비밀번호</label>
            </div>
            <div class="userBox">
              <input class="password check" type="password" name="pwdcheck" required="" />
              <label>비밀번호 확인</label>
              <span class="red">두 비밀번호가 달라요! 확인해 보시겠어요?</span>
            </div>
  
            <div class="userBox">
              <input type="email" name="email" required="" />
              <label>이메일</label>
            </div>
            <button class="joinBtn" type = "submit"></button>
          </form>
        </div>
      </div>
      <footer></footer>
    </div>

    <!-- 토스트 -->
    <div id="toast"></div>
    <!-- 토스트 -->

    <!-- 이미지 선택 모달 -->
    <div id="imgSelectModal" class="modal2 hidden">
      <div class="modalContent">
        <button class="closeBtn" onclick="closeModal()">❌</button>
        <h2>프로필 이미지 선택</h2>
        <div class="imgOptions">
          <img src="/forestOfOmok/img/profileImg1.jpg" data-img-id = "1" onclick="selectImage(this)" class="profileOption" />
          <img src="/forestOfOmok/img/profileImg2.png" data-img-id = "2" onclick="selectImage(this)" class="profileOption" />
          <img src="/forestOfOmok/img/profileImg3.png" data-img-id = "3" onclick="selectImage(this)" class="profileOption" />
          <img src="/forestOfOmok/img/profileImg4.png" data-img-id = "4" onclick="selectImage(this)" class="profileOption" />
          <img src="/forestOfOmok/img/profileImg5.png" data-img-id = "5" onclick="selectImage(this)" class="profileOption" />
          <img src="/forestOfOmok/img/profileImg6.png" data-img-id = "6" onclick="selectImage(this)" class="profileOption" />
        </div>
        <button onclick="applySelectedImage()" class="applyBtn">선택</button>
      </div>
    </div>

	<script>
      // 아이디 중복 체크 버튼 클릭
      $(".idCheckBtn").click(function () {
		const name = $("#name").val();
        const $toast = $("#toast");
        if(!name){
			$toast.text("❗ 아이디를 입력해주세요.");
			$toast.addClass("show");
			setTimeout(() => $toast.removeClass("show"),2000);
			return;
        }
        
        $.ajax({
			type: "POST",
			url : "/forestOfOmok/join",
			data : {
				name : name,
				check: 1 // 아이디 중복 확인 요청임을 나타냄
			},
			dataType: "json",
			success: function(data){
				if(data.exists){
					$toast.text("❌ 이미 사용 중인 아이디입니다.");
				}else{
					$toast.text("🌸 사용가능한 아이디입니다");
				}
				$toast.addClass("show");
				setTimeout(() => $toast.removeClass("show"), 2000);
			},
			error: function(){
				$toast.text("⚠️ 서버 오류가 발생했습니다.");
				$toast.addClass("show");
				setTimeout(() => $toast.removeClass("show"),2000);
			}
        });
        
     });

      // 비밀번호 확인 문구
      $(".userBox .password").on("keyup", function () {
        const pw = $(".userBox .password").val();
        const pwCheck = $(".userBox .check").val();
        const warning = $(".userBox .red");

        if (pwCheck.length > 0) {
          if (pwCheck !== pw) {
            warning.css("opacity", 1);
          } else warning.css("opacity", 0);
        } else warning.css("opacity", 0);
      });
    </script>
	<script src="/forestOfOmok/js/signUp.js"></script>
	<script>
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get("joined") === "true") {
    alert("🎉 회원가입이 완료되었습니다!");
     }
  


</script>

</body>
</html>
