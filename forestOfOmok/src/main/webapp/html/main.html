
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>오목의 숲 🍀</title>

<!-- <link rel="stylesheet" href="../css/reset.css" /> -->
<link rel="stylesheet" href="/forestOfOmok/css/reset.css" />
<link rel="stylesheet" href="/forestOfOmok/css/style.css" />
<link rel="icon" href="../img/sec05_chara02.png" />
<script
	src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="../js/utils.js"></script>

</head>
<body>
	<!-- 브금 제어 버튼 -->
	<div id="playico"></div>
	<div onclick="window.playBGM()" id="play"></div>
	<div onclick="window.stopBGM()" id="stop"></div>
	<!-- 브금 제어 버튼 -->
	<!-- 임시 버튼 -->
	<img src="/forestOfOmok/img/sec09_chara03.png" alt="" id="moveLoginBtn" />
	<img src="/forestOfOmok/img/slowlife_chara01__pc.png" alt=""
		id="moveGameBtn" />
	<!-- 임시 버튼 -->
	<!-- 임시 버튼 -->
	<!-- 로딩 화면 -->
	<div id="loadingScreen"
		style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; z-index: 9999; display: flex; align-items: center; justify-content: center;">
		<p style="font-size: 1.5rem;">로딩 중... 🍀</p>
	</div>
	<!-- 본문 전체 감싸기 -->
	<div id="mainApp" style="display: none;">
		<!-- 여기에 기존의 전체 컨텐츠 넣기 -->
		<!-- 브금 제어 버튼, 임시 버튼, container 등 전부 이 안에 들어가야 함 -->

		<div class="container main">
			<header>
				<span></span>
				<div class="searchBox">
					<section class="input-container">
						<label> <input id="searchInput" type="text"
							placeholder="검색어 입력" />
							<p class="hspan">검색어 입력</p>
						</label>
						<button type="button" class="search-btn">검색</button>
					</section>
				</div>
			</header>
			<div class="content">
				<div class="sideBoxL">
					<div class="profileBox">
						<div class="img"></div>
						<div class="textBox">
							<p>닉네임 : 테스트</p>
							<p>
								<span class="blue">100</span> 승 <span class="red">1</span> 패
							</p>
							<p>
								현재 순위 : <span class="yellow">1</span> 등
							</p>
						</div>
						<div class="createRommBtn"></div>
					</div>
					<div class="RankBox">
						<!-- 여기부터 지원 작성 -->
						<div class="rankTitle"></div>
						<ul class="rankList">

						</ul>
					</div>
					<div class="createRommBtn"></div>
				</div>
				<div class="sideBoxR">
					<ul class="tabs">
						<li class="active">게임하기 🎮</li>
						<li>전적보기 🏆</li>
					</ul>
					<div class="tabContainer">
						<div>
							<!-- 방 없을 때  -->
							<div class="emptyRoom">
								<span></span>
								<p>아직 방이 없어요</p>
								<p>방을 만들어서 시작해주세요!</p>
							</div>
							<!-- 방 있을 때 -->
							<ul class="roomList" style="display: none">
								<li class="roomItem play">
									<p class="title">✨ 새 방 생성123</p>
									<div class="text">
										<span>play 🔥</span> 1 / 2
									</div>
								</li>
								<li class="roomItem play">
									<p class="title">🍀 힐링의 숲</p>
									<div class="text">
										<span>play 🔥</span> 1 / 2
									</div>
								</li>
								<li class="roomItem play">
									<p class="title">🌙 밤하늘의 방</p>
									<div class="text">
										<span>play 🔥</span> 1 / 2
									</div>
								</li>
							</ul>
						</div>
						<div>
							<!-- 방 없을 때  -->
							<!-- <div class="emptyHistory">
                <span></span>
                <p>아직 전적이 없어요</p>
                <p>게임을 시작해보세요!</p>
              </div> -->
							<!-- 전적 아이템 -->
							<ul class="historyList">
								
							</ul>
						</div>
						<!-- style="display:none" -->
					</div>
				</div>
			</div>
		</div>
		<!-- 방 생성 팝업 -->
		<div id="createRoomModal"
			style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.5); z-index: 9999; justify-content: center; align-items: center;">
			<div
				style="background: white; padding: 20px; border-radius: 10px; text-align: center; width: 300px;">
				<h2>방 제목 입력</h2>
				<input type="text" id="roomTitleInput" placeholder="방 제목을 입력하세요"
					style="width: 90%; padding: 8px; margin: 10px 0;" /> <br />
				<button id="confirmCreateRoom">확인</button>
				<button id="cancelCreateRoom">취소</button>
			</div>
		</div>
		<!-- 모달창 -->
		<div id="modalComponent"></div>
		<script>
		$(window).on("load", function () {
		  // 로딩 화면 숨기기
		  $("#loadingScreen").fadeOut(500, function () {
		    $(this).remove(); // 완전히 제거 (선택사항)
		  });

		  // 본문 화면 보이기
		  $("#mainApp").fadeIn(300);
		});

      $(function () {
        let test = false; // 임시
        
        // api 템플릿
    	let connectApi = function(url, method, data, callback) {
    	$.ajax({
        	url: url,
        	method: method,
        	data: data,
        	dataType: "json",
        	success: function(res) {
            	console.log(res);
            	if (callback) callback(res); // 콜백으로 결과 전달
        	},
        	error: function() {
            	console.log("실패");
            	if (callback) callback(null); // 에러 시 null 전달
            	},
        	});
    	};

        // modal.html 불러오기
        $("#modalComponent").load("/forestOfOmok/html/modal.html");

        // 방 만들기
        $(".createRommBtn").click(function () {
          alert("방만들기");
          test = true; // 테스트로 방만들기 true
          $(".emptyRoom").hide(); // 방 없을때 메시지 숨김
          $(".roomList").show(); // 방 있을때 컴포넌트 display: none -> show 노출

             let title = prompt("방 타이틀을 입력하세요");
          let req = {
        		  title:title
          }
          if(title){
        	  console.log(title);
        	  connectApi("http://localhost:8092/forestOfOmok/main/createRoom", "POST", req, function(data) {
        		  if (data) {
        		        console.log("받은 데이터:", data);
        		        $(".roomList").prepend(`
        		            <li class="roomItem"  data-game-id="${data.gameId}">
        		                <p class="title">✨ ${data.title}</p>
        		                <div class="text">
        		                    <span>play 🔥</span> 1 / 2
        		                </div>
        		            </li>
        		        `);
        		    } else {
                      // 실패했을 때 처리
                  console.log("데이터 로딩 실패");
                  }
              });   
          } else {
        	  console.log("취소")
          }
          
        }); 


        // 방 들어가기
        // 동적으로 추가된 방
        // .click() 바인딩은 나중에 추가된 요소는 반응하지 않는다고함
        // -> 이벤트 위임 방식 이용
        $(".roomList").on("click", ".roomItem", function () {
          const index = $(".roomList .roomItem").index(this);
          console.log(index);
          alert(`방 ${index + 1}번`);
          
          
          location.href = "/forestOfOmok/enter";
          
        });

        // 로그인 페이지로 이동 (임시)
        $("#moveLoginBtn").click(function () {
          location.href = "/forestOfOmok/html/login.html"; // 같은 폴더라면 슬래시 (/) 없이
        });

        // 게임 페이지로 이동 (임시)
        $("#moveGameBtn").click(function () {
          location.href = "/forestOfOmok/html/game.html"; // 같은 폴더라면 슬래시 (/) 없이
        });

        // 탭
        $(".tabs li").click(function () {
          const index = $(this).index(); // 클릭한 li 인덱스

          $(".tabs li").removeClass("active");
          $(this).addClass("active");

          $(".tabContainer > div").hide();
          $(".tabContainer > div").eq(index).show();
        });
        
     // 검색어 입력 시 이벤트
        $("#searchInput").on("keyup", function () {
          const keyword = $(this).val();

          $(".roomList .roomItem").each(function () {
            const roomName = $(this).find(".title").text();
            console.log(roomName);

            if (roomName.includes(keyword)) {
              $(this).show(); // 포함되면 보이기
            } else {
              $(this).hide(); // 아니면 숨기기
            }
          });
        });
     
     // 버튼 클릭 시 열리고, 닫힘 토글
       $(document).on("click", ".historyItemL, .historyItemR", function () {
		  const historyItem = $(this).closest(".historyItem");
		  const historyPannel = historyItem.closest("li").find(".historyPannel");
		  const isOpen = historyPannel.is(":visible");
		
		  if (isOpen) {
		    historyPannel.slideUp(300);
		    historyItem.css("border-radius", "20px");
		  } else {
		    historyPannel.slideDown(300);
		    historyItem.css({
		      "border-bottom-left-radius": "0",
		      "border-bottom-right-radius": "0",
		    });
		
		    const isLeft = $(this).hasClass("historyItemL");
		    if (isLeft) {
		      $(this).css("background-color", "black");
		      historyPannel.css("background-color", "black");
		      historyPannel.css("color", "white");
		    } else {
		      $(this).css("background-color", "white");
		      historyPannel.css("background-color", "white");
		      historyPannel.css("color", "black");
		    }
		  }
		});

        let slideOpen = function (direction, paddingSelf, paddingTarget) {
          $(this).css({
            width: "100%",
            "z-index": "2",
            padding: paddingSelf, // 점령한 쪽은 여백 없애기
          });
          $(this).siblings(direction).css({
            width: "0%",
            padding: paddingTarget, // 밀린 쪽도 여백 없애기
          });
        };

        let slideClose = function (direction, paddingSelf, paddingTarget) {
          $(this).css({
            width: "50%",
            "z-index": "1",
            padding: paddingSelf, // 원상복귀
          });
          $(this).siblings(direction).css({
            width: "50%",
            padding: paddingTarget, // 원상복귀
          });
        };

        /// 왼쪽 hover 시
		$(".historyList").on("mouseenter", ".historyItemL", function () {
		  slideOpen.call(this, ".historyItemR", "10px 0", "10px 0");
		});
		$(".historyList").on("mouseleave", ".historyItemL", function () {
		  slideClose.call(this, ".historyItemR", "10px 5px 10px 0", "10px 0 10px 5px");
		});
		
		// 오른쪽 hover 시
		$(".historyList").on("mouseenter", ".historyItemR", function () {
		  slideOpen.call(this, ".historyItemL", "10px 0", "10px 0");
		});
		$(".historyList").on("mouseleave", ".historyItemR", function () {
		  slideClose.call(this, ".historyItemL", "10px 0 10px 5px", "10px 5px 10px 0");
		});
     
        
     

        connectApi("http://localhost:8092/forestOfOmok/main/profile", "GET",{}, function(data) {
            if (data) {
                // 성공했을 때 처리
            console.log("받은 데이터:", data);
            $(".profileBox .img").css("background-image", `url('${data.imgPath}')`);
                $(".textBox p:first").text(data.name); // 닉네임
                $(".blue").text(data.winCnt); // 승
                $(".red").text(data.loseCnt); // 패
                // 여기서 DOM 조작이나 다른 작업 수행
            } else {
                // 실패했을 때 처리
            console.log("데이터 로딩 실패");
            }
        });      
        
        connectApi("http://localhost:8092/forestOfOmok/main/rank", "GET", {},function(data) {
        	  if (data) {
        	    console.log("받은 데이터:", data);
      	      //$(".profileBox .img").css("background-image", `url('${data.imgPath}')`);
      	      //http://localhost:8092/forestOfOmok/img/profileImg5.png

        	    // rank 배열을 반복
        	    data.rank.forEach(function(item) {
        	    	$(".rankList").append(
        	    			  `<li class="rankItem">
        	    			    <span class="rankProfileName">${item.rank}등</span>
        	    			    <img id="rankProfile" src="http://localhost:8092${item.profile}" style="width: 30px; height: 30px;" />
        	    			    <span class="rankProfileName">${item.name}</span>
        	    			  </li>`
        	    			);
        	    	
        	    });
        	  } else {
        	    console.log("데이터 로딩 실패");
        	  }
        	});
        
        	
        
        connectApi("http://localhost:8092/forestOfOmok/main/getRoomList", "GET", {}, function(data) {
        	if (data) {
        		$(".emptyRoom").css("display","none");
        		$(".roomList").css("display","block");
                console.log("방 리스트:", data);
                $(".roomList").empty(); // 기존 목록 비우기
                data.forEach(room => {
                    $(".roomList").prepend(`
                        <li class="roomItem">
                            <p class="title">✨ ${room.title}</p>
                            <div class="text">
                                <span>play 🔥</span> 1 / 2
                            </div>
                        </li>
                    `);
                });
            }  else {
                // 실패했을 때 처리
            console.log("데이터 로딩 실패");
            }
        });

        
        connectApi("http://localhost:8092/forestOfOmok/main/history", "GET",{}, function (data) {
        	  if (data && data.history) {
        	    console.log("받은 데이터:", data);

        	    data.history.forEach(function (item) {
        	      const isMeLeft = item.winnerColor === "black";

        	      const leftHTML = `
        	        <span class="historyStoneInfoMe">${isMeLeft ? "승" : "패"}</span>
        	        <img id="historyProfileMe" src="http://localhost:8092${item.imgPath}" style="width: 30px; height: 30px; border-radius: 50%; margin: 0px 10px;" />
        	        <span class="historyNickNameMe">${isMeLeft ? item.winnerName : item.loserName}</span>
        	      `;

        	      const rightHTML = `
        	        <span class="historyNickNameYou">${isMeLeft ? item.loserName : item.winnerName}</span>
        	        <img id="historyProfileYou" src="http://localhost:8092${item.imgPath}" style="width: 30px; height: 30px; border-radius: 50%; margin: 0px 10px;" />
        	        <span class="historyStoneInfoYou">${isMeLeft ? "패" : "승"}</span>
        	      `;

        	      const html = `
        	        <li>
        	          <div class="historyItem">
        	            <div class="historyItemL">
        	              ${leftHTML}
        	            </div>
        	            <div class="historyItemR">
        	              ${rightHTML}
        	            </div>
        	          </div>
        	          <div class="historyPannel">
        	            <div class="historyTime">시간 : ${item.time}</div>
        	            <div class="historyTurn">턴수 : ${item.turnCount}</div>
        	          </div>
        	        </li>
        	      `;

        	      $(".historyList").append(html);
        	    });
        	  } else {
        	    console.log("데이터 로딩 실패");
        	  }
        	});

      });
    </script>
</body>
</html>
